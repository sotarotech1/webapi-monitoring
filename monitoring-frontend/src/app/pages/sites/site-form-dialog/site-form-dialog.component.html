<div class="p-1">
  <h3 class="font-bold text-lg mb-4">{{ isEdit ? 'Edit Site' : 'Add New Site' }}</h3>

  <form [formGroup]="form" class="flex flex-col gap-3">

    <div class="form-control">
      <label class="label pb-1"><span class="label-text font-medium">Name</span></label>
      <input type="text" class="input input-bordered w-full"
             [class.input-error]="form.get('name')?.invalid && form.get('name')?.touched"
             placeholder="My Website" formControlName="name" />
      @if (form.get('name')?.touched && form.get('name')?.errors?.['required']) {
        <label class="label pt-1"><span class="label-text-alt text-error">Name is required</span></label>
      }
    </div>

    <div class="form-control">
      <label class="label pb-1"><span class="label-text font-medium">URL</span></label>
      <input type="url" class="input input-bordered w-full"
             [class.input-error]="form.get('url')?.invalid && form.get('url')?.touched"
             placeholder="https://example.com" formControlName="url" />
      @if (form.get('url')?.touched && form.get('url')?.errors?.['required']) {
        <label class="label pt-1"><span class="label-text-alt text-error">URL is required</span></label>
      }
      @if (form.get('url')?.touched && form.get('url')?.errors?.['pattern']) {
        <label class="label pt-1"><span class="label-text-alt text-error">Must start with http:// or https://</span></label>
      }
    </div>

    <div class="form-control">
      <label class="label pb-1"><span class="label-text font-medium">Check Interval</span></label>
      <select class="select select-bordered w-full" formControlName="check_interval_minutes">
        @for (i of intervals; track i) {
          <option [value]="i">Every {{ i }} minute{{ i !== 1 ? 's' : '' }}</option>
        }
      </select>
    </div>

    <div class="form-control">
      <label class="label cursor-pointer justify-start gap-4">
        <input type="checkbox" class="toggle toggle-primary" formControlName="is_active" />
        <span class="label-text font-medium">Active monitoring</span>
      </label>
    </div>

  </form>

  <div class="flex justify-end gap-2 mt-6">
    <button class="btn btn-ghost" (click)="cancelled.emit()" [disabled]="loading()">Cancel</button>
    <button class="btn btn-primary" (click)="submit()" [disabled]="loading() || form.invalid">
      @if (loading()) { <span class="loading loading-spinner loading-sm"></span> }
      {{ isEdit ? 'Save Changes' : 'Add Site' }}
    </button>
  </div>
</div>
