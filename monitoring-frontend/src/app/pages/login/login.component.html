<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-slate-900 px-4">
  <div class="card w-full max-w-md bg-base-100 shadow-2xl">
    <div class="card-body gap-4">

      <!-- Logo -->
      <div class="flex flex-col items-center gap-2 mb-2">
        <div class="w-14 h-14 rounded-2xl bg-primary/10 flex items-center justify-center">
          <i class="fas fa-heart-pulse text-primary text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Monitor</h1>
        <p class="text-sm text-gray-500">Sign in to your account</p>
      </div>

      <!-- Error -->
      @if (error()) {
        <div class="alert alert-error text-sm py-2">
          <i class="fas fa-circle-exclamation"></i>
          <span>{{ error() }}</span>
        </div>
      }

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-3">

        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-medium">Email</span></label>
          <label class="input input-bordered flex items-center gap-2"
                 [class.input-error]="form.get('email')?.invalid && form.get('email')?.touched">
            <i class="fas fa-envelope text-gray-400 text-sm"></i>
            <input type="email" class="grow" placeholder="you@example.com"
                   formControlName="email" autocomplete="email" />
          </label>
          @if (form.get('email')?.touched && form.get('email')?.errors?.['email']) {
            <label class="label pt-1"><span class="label-text-alt text-error">Invalid email address</span></label>
          }
        </div>

        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-medium">Password</span></label>
          <label class="input input-bordered flex items-center gap-2"
                 [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched">
            <i class="fas fa-lock text-gray-400 text-sm"></i>
            <input [type]="showPassword() ? 'text' : 'password'" class="grow"
                   placeholder="••••••••" formControlName="password" autocomplete="current-password" />
            <button type="button" class="text-gray-400 hover:text-gray-600 transition-colors"
                    (click)="showPassword.set(!showPassword())">
              <i class="fas" [class.fa-eye]="!showPassword()" [class.fa-eye-slash]="showPassword()"></i>
            </button>
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-full mt-2"
                [disabled]="loading() || form.invalid">
          @if (loading()) {
            <span class="loading loading-spinner loading-sm"></span>
          } @else {
            <i class="fas fa-right-to-bracket"></i>
          }
          {{ loading() ? 'Signing in...' : 'Sign In' }}
        </button>

      </form>

      <p class="text-center text-sm text-gray-500">
        Don't have an account?
        <a routerLink="/register" class="text-primary font-semibold hover:underline">Create one</a>
      </p>

    </div>
  </div>
</div>
