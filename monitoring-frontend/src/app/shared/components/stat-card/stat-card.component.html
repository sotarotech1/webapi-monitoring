<div class="card bg-base-100 shadow-sm hover:shadow-md transition-shadow">
  <div class="card-body flex-row items-center gap-4 p-5">
    <div class="w-14 h-14 rounded-2xl flex items-center justify-center flex-shrink-0" [class]="iconClass">
      <i class="fas {{ icon }} text-xl"></i>
    </div>
    <div>
      <div class="text-3xl font-bold text-gray-800">{{ value }}</div>
      <div class="text-sm text-gray-500 mt-0.5">{{ label }}</div>
    </div>
  </div>
</div>
