<aside class="w-60 min-w-[240px] bg-gray-900 text-white flex flex-col h-full">

  <!-- Logo -->
  <div class="flex items-center gap-3 px-5 py-5 border-b border-white/10">
    <i class="fas fa-heart-pulse text-sky-400 text-2xl"></i>
    <span class="text-lg font-bold tracking-wide">Monitor</span>
  </div>

  <!-- Nav -->
  <nav class="flex-1 py-3">
    @for (link of navLinks; track link.path) {
      <a
        class="sidebar-link flex items-center gap-3 px-5 py-3 text-white/60 hover:text-white hover:bg-white/7 transition-all text-sm font-medium cursor-pointer"
        [routerLink]="link.path"
        routerLinkActive="active">
        <i class="fas {{ link.icon }} w-4 text-center"></i>
        {{ link.label }}
      </a>
    }
  </nav>

  <!-- Footer -->
  <div class="flex items-center justify-between px-4 py-4 border-t border-white/10">
    <div class="flex items-center gap-2 text-white/50 text-sm overflow-hidden">
      <i class="fas fa-user text-xs flex-shrink-0"></i>
      <span class="truncate">{{ auth.user()?.name ?? 'User' }}</span>
    </div>
    <button
      class="text-white/40 hover:text-red-400 transition-colors p-2 rounded-full hover:bg-red-400/10"
      (click)="auth.logout()"
      title="Logout">
      <i class="fas fa-right-from-bracket text-sm"></i>
    </button>
  </div>

</aside>
